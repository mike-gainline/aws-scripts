# NAT Gateway Portfolio Configuration
# ========================================
# This config file defines all NAT Gateways to manage and their configuration.
# Add new NAT Gateways here - no code changes needed!

version: "1.0"
aws_account_id: "311330778203"
aws_region: "us-east-1"

nat_gateways:
  - name: "portfolio-managed-nat"
    description: "Managed NAT Gateway for SNO Mass and Bloom applications"
    availability_zone: "us-east-1a"
    subnet_id: "subnet-06b37301fd46ae26d"  # SNOMassDatabaseStack/SNOMassVPC/PublicSubnet1

    # Elastic IP allocation ID - Created: 52.72.164.240
    allocation_id: "eipalloc-0ef0d1621fb6a8884"

    # Route tables for private subnets (SNO Mass and Bloom apps use these)
    route_tables:
      - "rtb-00ef75c505344b6c0"  # SNOMassDatabaseStack/SNOMassVPC/PrivateSubnet1
      - "rtb-00e26203f58252d3f"  # SNOMassDatabaseStack/SNOMassVPC/PrivateSubnet2
    
    # Route destination (typically 0.0.0.0/0 for all internet traffic)
    route_destination: "0.0.0.0/0"
    
    # Tags for cost tracking and identification
    tags:
      Project: "SNOMass-Bloom-Portfolio"
      Environment: "Production"
      CostCenter: "Portfolio"
      Applications: "SNOMass,BloomPrototype"
      ManagedBy: "PortfolioNATManager"

  # Template for adding more NAT Gateways:
  # - name: "secondary-nat"
  #   description: "Secondary NAT Gateway for us-east-1b"
  #   availability_zone: "us-east-1b"
  #   subnet_id: "subnet-yyyyyyyy"
  #   allocation_id: "eipalloc-yyyyyyyy"
  #   route_tables:
  #     - "rtb-zzzzzzzz"
  #   route_destination: "0.0.0.0/0"
  #   tags:
  #     Project: "PortfolioApps"
  #     Environment: "Prototype"

# Cost estimates (per month per NAT Gateway)
cost_estimates:
  running_per_month: 40  # ~$40/month for running NAT Gateway
  deleted_per_month: 1   # ~$0.32-1/month for Elastic IP storage only
  hourly_rate: 0.045     # Plus $0.045/GB for data processed

# Notes for configuration:
# 1. Find your subnet IDs:
#    aws ec2 describe-subnets --query 'Subnets[].{Name:Tags[0].Value,SubnetId:SubnetId}' --output table
#
# 2. Create or find an Elastic IP:
#    aws ec2 allocate-address --domain vpc
#    aws ec2 describe-addresses --query 'Addresses[?AssociationId==null]'
#
# 3. Find your route tables:
#    aws ec2 describe-route-tables --query 'RouteTables[].{Name:Tags[0].Value,RouteTableId:RouteTableId}' --output table
#
# 4. Update configuration with actual IDs
#
# 5. Test with: ./portfolio-nat-manager.sh list

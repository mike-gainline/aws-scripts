# RDS Portfolio Management Configuration
# ========================================
# This config file defines all RDS instances to manage and their lifecycle policies.
# Add new instances here - no code changes needed!

version: "1.0"
aws_account_id: "311330778203"
aws_region: "us-east-1"

# S3 bucket for database backups (used in delete/restore approach)
s3_backup_bucket: "portfolio-db-backups-311330778203"
s3_backup_lifecycle_days: 90  # Move to Glacier after this many days

# DynamoDB table for state tracking (auto-created if needed)
dynamodb_state_table: "portfolio-rds-state"

# RDS Instances to manage
instances:
  - name: "bloom-prototype"
    db_identifier: "bloom-prototype-db"
    engine: "postgres"
    engine_version: "15.4"
    instance_class: "db.t3.micro"
    allocated_storage: 20
    master_username: "postgres"
    database_name: "bloom"
    vpc_security_groups: ["sg-04691fa655c6458ab"]
    db_subnet_group: "default"
    
    # Lifecycle management strategy
    lifecycle:
      # strategy: "stop-start" = Pause compute, keep storage (50% savings, instant resume)
      # strategy: "delete-restore" = Full backup/restore (100% savings, 10-15 min setup)
      strategy: "stop-start"
      
      # For stop-start strategy
      auto_restart_days: 7  # Lambda will restart after 7 days (AWS limitation)
      
      # For delete-restore strategy
      backup_before_delete: true
      backup_retention_days: 30
      
    # Notifications
    notifications_enabled: true
    notification_email: "mike+aws@gainline.ai"
    
    # Tags for cost tracking
    tags:
      Project: "Bloom Housing"
      Environment: "Prototype"
      CostCenter: "Portfolio"

  - name: "snomass"
    db_identifier: "snomassdatabasestack-snomassdatabase26438ae2-cdxzoty639om"
    engine: "mysql"
    engine_version: "8.0"
    instance_class: "db.t3.micro"
    allocated_storage: 20
    master_username: "admin"
    database_name: "snomass"
    vpc_security_groups: ["sg-07177376e86ac1818"]
    db_subnet_group: "default"
    
    lifecycle:
      strategy: "stop-start"
      auto_restart_days: 7
      backup_before_delete: true
      backup_retention_days: 30
    
    # CloudFormation stack info (if managed by CF)
    cloudformation:
      stack_name: "SNOMassDatabaseStack"
      update_stack: false  # Set true if you want to update via CF
    
    notifications_enabled: true
    notification_email: "mike+aws@gainline.ai"

    tags:
      Project: "SNO Mass Portal"
      Environment: "Production"
      CostCenter: "Portfolio"

  # Template for adding new instances:
  # - name: "my-new-db"
  #   db_identifier: "my-new-db-identifier"
  #   engine: "postgres"  # or mysql, mariadb, oracle, sqlserver
  #   engine_version: "15.4"
  #   instance_class: "db.t3.micro"
  #   allocated_storage: 20
  #   master_username: "postgres"
  #   database_name: "mydb"
  #   vpc_security_groups: ["sg-xxxxxxxxx"]
  #   db_subnet_group: "default"
  #   
  #   lifecycle:
  #     strategy: "stop-start"
  #     auto_restart_days: 7
  #
  #   notifications_enabled: true
  #   notification_email: "mike+aws@gainline.ai"
  #   
  #   tags:
  #     Project: "My Project"
  #     Environment: "Dev"
  #     CostCenter: "MyTeam"

# Lambda configuration
lambda:
  function_name: "portfolio-rds-manager"
  log_retention_days: 7
  timeout_seconds: 300
  
  # EventBridge schedule for auto-restart check
  # Cron: run every 6 hours to check for instances that need restarting
  schedule_expression: "cron(0 */6 * * ? *)"

# Cost tracking
cost_estimates:
  # Monthly costs per instance (db.t3.micro)
  postgres_running: 13.00
  postgres_stopped: 6.50
  postgres_deleted_storage: 0.12
  
  mysql_running: 13.00
  mysql_stopped: 6.50
  mysql_deleted_storage: 0.12
  
  s3_storage_per_gb: 0.023
  s3_request_cost: 0.0004  # Per 1000 requests
